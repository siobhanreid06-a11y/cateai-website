*{box-sizing:border-box;margin:0;padding:0}
:root{--pu:#3D1F6E;--pu2:#5A3490;--pu1:#F5F0FF;--pu0:#E8DFFF;--go:#C4913A;--gl:#E8B86D;--go1:#FFF8EE;
      --sl:#4A5568;--sm:#8799A0;--sb:#C8D0D4;--sl1:#EEF0F2;--g:#1D9E75;--f:'Poppins',sans-serif}
body{font-family:var(--f);background:#ECEEF0;color:var(--sl)}
button,select{cursor:pointer;font-family:var(--f)}
input,textarea{cursor:text;font-family:var(--f)}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:1100px;margin:0 auto;box-shadow:0 0 60px rgba(61,31,110,.15);background:#fff}
.topbar{background:var(--pu);padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:100;flex-shrink:0}
.ql-bar{background:var(--pu1);border-bottom:1px solid var(--pu0);padding:8px 22px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0}
.ql-link{background:#fff;border:1px solid var(--pu0);border-radius:8px;padding:6px 13px;display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0;transition:box-shadow .15s}
.ql-link:hover{box-shadow:0 2px 8px rgba(61,31,110,.15)}
.body-wrap{display:flex;flex:1;min-height:0}
.sidebar{width:172px;flex-shrink:0;background:#fff;border-right:1px solid var(--pu0);padding:12px 0;overflow-y:auto;position:sticky;top:92px;max-height:calc(100vh - 92px);align-self:flex-start}
.main-content{flex:1;min-width:0;padding:22px;overflow-y:auto}
.nb{width:100%;padding:10px 14px;display:flex;align-items:center;gap:9px;background:transparent;border:none;border-left:3px solid transparent;text-align:left;cursor:pointer;transition:background .12s}
.nb.on{background:var(--pu1);border-left-color:var(--pu)}
.nb:hover:not(.on){background:var(--sl1)}
.nb i{font-size:14px;flex-shrink:0}
.nb span{font-size:12px;line-height:1.3}
.nb.on span{font-weight:600;color:var(--pu)}
.nav-label{padding:6px 14px 4px;font-size:9.5px;font-weight:700;letter-spacing:1px;color:var(--sm);text-transform:uppercase}
.nav-div{height:1px;background:var(--pu0);margin:8px 14px}
.card{background:#fff;border:1px solid var(--pu0);border-radius:12px;padding:16px;margin-bottom:10px}
.sh{margin-bottom:20px}
.sh h2{color:var(--pu);font-size:20px;font-weight:700;margin-bottom:5px;letter-spacing:-.3px}
.sh p{color:var(--sm);font-size:13px;line-height:1.6}
.sh-line{height:3px;background:linear-gradient(90deg,var(--go),var(--gl),transparent);border-radius:2px;margin-top:10px}
.row-link{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--sl1);text-decoration:none;transition:background .1s}
.row-link:last-child{border-bottom:none}
.row-link:hover{background:var(--pu1)}
.tab-bar{display:flex;border-bottom:1px solid var(--pu0);margin-bottom:18px;overflow-x:auto;flex-shrink:0}
.tab{padding:10px 14px;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:var(--sm);white-space:nowrap;font-family:var(--f)}
.tab.on{color:var(--pu);border-bottom-color:var(--go);font-weight:600}
input[type=text],textarea,select{width:100%;padding:10px 13px;border:1px solid var(--sb);border-radius:9px;font-size:13px;color:var(--sl);background:#fff;display:block}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pu)}
textarea{resize:none}
.pill{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600}
.ben-card{background:#fff;border:1px solid var(--pu0);border-radius:12px;padding:15px;margin-bottom:8px;cursor:pointer}
.chat-msgs{background:#fff;border:1px solid var(--pu0);border-radius:12px;padding:14px;min-height:240px;max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.bubble{max-width:84%;padding:10px 14px;font-size:13px;line-height:1.65;white-space:pre-wrap}
.bubble.u{background:var(--pu);color:#fff;border-radius:14px 14px 4px 14px}
.bubble.a{background:var(--pu1);color:var(--sl);border-radius:14px 14px 14px 4px}
.btn-r{background:var(--pu);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-family:var(--f)}
.btn-r:hover{background:var(--pu2)}
.btn-go{background:var(--go);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-family:var(--f)}
.news-card{background:#fff;border:1px solid var(--pu0);border-radius:12px;padding:16px;margin-bottom:11px}
.brand-footer{background:var(--pu);text-align:center;padding:10px;font-size:10px;color:rgba(255,255,255,.6);flex-shrink:0}
.brand-footer span{color:var(--gl);font-weight:600}
@media(max-width:640px){
  .sidebar{width:100%;position:static;max-height:none;display:flex;flex-wrap:nowrap;overflow-x:auto;border-right:none;border-bottom:1px solid var(--pu0);padding:4px 0}
  .nb{min-width:72px;border-left:none;border-bottom:3px solid transparent;padding:7px 8px;flex-direction:column;gap:3px;align-items:center}
  .nb.on{border-bottom-color:var(--pu);background:var(--pu1)}
  .nb span{font-size:9.5px;text-align:center}
  .body-wrap{flex-direction:column}
  .main-content{padding:14px}
  .nav-label,.nav-div{display:none}
}
</style>

function sendPC(){
  var inp=document.getElementById("pci");
  if(!inp||!inp.value.trim())return;
  var q=inp.value.trim();inp.value="";
  S.pc.push({r:"u",t:q});R();
  setTimeout(function(){
    var ans=getPCAnswer(q);
    S.pc.push({r:"a",t:ans});R();
  },800);
}

function getPCAnswer(q){
  var ql=q.toLowerCase();
  if(ql.includes("annual leave")||ql.includes("holiday")){
    return "Annual leave entitlement at "+CFG.org+" ranges from 20 to 25 days per year depending on your role and length of service. Leave must be requested and approved in advance through "+CFG.hrSystem+". For your specific entitlement, check your contract or contact P&C at "+CFG.pcEmail+".";
  } else if(ql.includes("sick")||ql.includes("illness")||ql.includes("absence")){
    return "Under the Sick Leave Act 2022, you are entitled to statutory sick pay for up to 5 days per year (rising to 10 by 2026). For absences under 3 days, you need to complete a self-certification form on your return. From day 3, a medical certificate from your GP is required. Contact P&C at "+CFG.pcEmail+" for details of our company sick pay policy.";
  } else if(ql.includes("maternity")||ql.includes("pregnant")){
    return "Maternity leave entitlement is 26 weeks' standard leave plus 16 weeks' additional leave (42 weeks total). Statutory maternity benefit applies during standard leave. Enhanced company maternity pay may apply — contact P&C at "+CFG.pcEmail+" for a confidential conversation.";
  } else if(ql.includes("remote")||ql.includes("work from home")||ql.includes("wfh")||ql.includes("hybrid")){
    return "Hybrid working is available for eligible roles at "+CFG.org+". The standard arrangement is 2–3 days per week from home, with core hours to be observed. All remote working arrangements must be agreed with your line manager. Review the Remote Working Policy on the intranet for full details.";
  } else if(ql.includes("eap")||ql.includes("counselling")||ql.includes("mental health")||ql.includes("assistance")){
    return "The Employee Assistance Programme (EAP) provides free, confidential support 24/7 for you, your partner and dependent children over 16. This includes up to 6 counselling sessions per year, financial advice, legal advice, and wellbeing resources. The EAP is completely confidential — your manager will never be informed. Contact P&C for access details.";
  } else if(ql.includes("grievance")||ql.includes("complaint")||ql.includes("harassment")||ql.includes("bullying")){
    return "If you have a concern, complaint or grievance, "+CFG.org+" has a formal Grievance Procedure and a Dignity at Work Policy. You can raise a concern informally with your line manager or P&C, or formally through the grievance process. All concerns are handled confidentially. Contact P&C at "+CFG.pcEmail+" for a confidential conversation. You can also access the Grievance Form in the Forms section.";
  } else if(ql.includes("pay")||ql.includes("salary")||ql.includes("payslip")){
    return "Pay and salary queries should be directed to your manager or the Finance/People & Culture team. Payslips are typically available through "+CFG.hrSystem+". For queries about your pay, deductions or payslip, contact P&C at "+CFG.pcEmail+".";
  } else if(ql.includes("probation")){
    return "The probationary period at "+CFG.org+" is typically 6 months. You will have a formal review at 3 months (90-day) and a final review at 6 months. Both reviews are documented in "+CFG.hrSystem+". Your objectives should be agreed with your manager in your first week. Contact P&C if you have any concerns about your probation.";
  } else if(ql.includes("training")||ql.includes("course")||ql.includes("development")||ql.includes("cpd")){
    return ""+CFG.org+" supports your professional development. If you have a training need — a course, qualification, conference or coaching — discuss it with your manager first, then contact P&C. Your CPD record and training history are in "+CFG.hrSystem+". There is an annual L&D budget available for eligible staff.";
  } else {
    return "Thanks for your question. For the most accurate and up-to-date information on that topic, I recommend speaking directly with the People & Culture team at "+CFG.pcEmail+" — they can give you a personalised answer. You can also browse the Policies section for the relevant policy document.";
  }
}

  var keys=["q1","q2","q3","q4","q5"];
  for(var i=0;i<keys.length;i++){if(!PS[keys[i]]){alert("Please answer all 5 questions before submitting.");return;}}
  var avg=(PS.q1+PS.q2+PS.q3+PS.q4+PS.q5)/5;
  PULSE_RESULTS={q1:PS.q1,q2:PS.q2,q3:PS.q3,q4:PS.q4,q5:PS.q5,avg:avg,open:document.getElementById("pulse-open")?document.getElementById("pulse-open").value:""};
  R();
}
